<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordCheck">
    <title>⚡ WordCheck iOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none;
        }
        #camera-view {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Zona de escaneo - solo esta área se procesa */
        #scan-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            height: 110px;
            border: 3px solid #30D158;
            border-radius: 18px;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.5), 0 0 40px rgba(48,209,88,0.3), inset 0 0 30px rgba(48,209,88,0.05);
            pointer-events: none;
        }
        #scan-zone::before {
            content: 'ENFOCA LA PALABRA';
            position: absolute;
            top: -32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 700;
            color: #30D158;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(48,209,88,0.5);
            white-space: nowrap;
        }
        .scan-laser {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #30D158;
            box-shadow: 0 0 15px #30D158, 0 0 30px #30D158;
            animation: laser 1.8s ease-in-out infinite;
            border-radius: 1px;
        }
        @keyframes laser {
            0%, 100% { top: 15%; opacity: 0.3; }
            50% { top: 85%; opacity: 1; }
        }
        /* Esquinas decorativas */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #30D158;
            border-style: solid;
        }
        .corner-tl { top: -3px; left: -3px; border-width: 4px 0 0 4px; border-radius: 8px 0 0 0; }
        .corner-tr { top: -3px; right: -3px; border-width: 4px 4px 0 0; border-radius: 0 8px 0 0; }
        .corner-bl { bottom: -3px; left: -3px; border-width: 0 0 4px 4px; border-radius: 0 0 0 8px; }
        .corner-br { bottom: -3px; right: -3px; border-width: 0 4px 4px 0; border-radius: 0 0 8px 0; }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .badge {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge.dict-loading { color: #FF9F0A; }
        .badge.dict-ready { color: #30D158; }
        .badge.dict-error { color: #FF453A; }
        #timer-badge { color: #64D2FF; font-family: 'SF Mono', monospace; font-size: 13px; }
        
        /* Botón de captura manual */
        #capture-btn {
            position: absolute;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 4px solid rgba(255,255,255,0.8);
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s;
        }
        #capture-btn:active { transform: translateX(-50%) scale(0.92); }
        #capture-btn::after {
            content: '';
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #fff;
            transition: background 0.2s;
        }
        #capture-btn.processing::after { background: #FF9F0A; }
        
        /* Result Panel */
        #result-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            padding: 24px 20px 32px;
            padding-bottom: max(32px, env(safe-area-inset-bottom));
            border-radius: 28px 28px 0 0;
            transform: translateY(110%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 100;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        #result-sheet.active { transform: translateY(0); }
        .word-display {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            line-height: 1.1;
        }
        .result-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
        }
        .result-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .result-valid { color: #30D158; }
        .result-valid .result-icon { background: #30D158; color: #000; }
        .result-invalid { color: #FF453A; }
        .result-invalid .result-icon { background: #FF453A; color: #fff; }
        .result-checking { color: #FF9F0A; }
        .result-checking .result-icon { background: #FF9F0A; color: #000; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .confidence-track {
            margin-top: 16px;
            height: 5px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Pantalla de carga */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            gap: 20px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top-color: #30D158;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #30D158, #64D2FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loading-sub {
            color: #8E8E93;
            font-size: 14px;
            text-align: center;
            max-width: 260px;
            line-height: 1.5;
        }
        .progress-ios {
            width: 200px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-ios-fill {
            height: 100%;
            background: #30D158;
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }
        .word-count {
            color: #8E8E93;
            font-size: 13px;
            margin-top: 4px;
        }
        
        /* Flash */
        #flash-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 90;
            transition: opacity 0.08s;
        }
        #flash-overlay.on { opacity: 0.25; }
        
        /* Toast para última palabra */
        #history-pill {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            color: #8E8E93;
            opacity: 0;
            transition: all 0.3s;
            white-space: nowrap;
            z-index: 15;
        }
        #history-pill.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Botón cerrar resultado */
        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Pantalla de carga del diccionario -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-title">WordCheck</div>
        <div class="loading-sub">Descargando base de datos de palabras en inglés...</div>
        <div class="progress-ios"><div class="progress-ios-fill" id="load-progress"></div></div>
        <div class="word-count" id="word-count">0 palabras</div>
    </div>

    <!-- Flash -->
    <div id="flash-overlay"></div>

    <!-- Vista de cámara -->
    <div id="camera-view" style="display:none;">
        <video id="video" autoplay playsinline muted></video>
        
        <div id="scan-zone">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="scan-laser"></div>
        </div>
        
        <div id="ui-layer">
            <div class="badge dict-loading" id="dict-badge">
                <span id="dict-icon">⏳</span>
                <span id="dict-label">Cargando...</span>
            </div>
            <div class="badge" id="timer-badge">0ms</div>
        </div>
        
        <div id="history-pill">Última: -</div>
        
        <button id="capture-btn" onclick="manualCapture()"></button>
    </div>

    <!-- Resultado -->
    <div id="result-sheet">
        <button class="close-btn" onclick="closeResult()">✕</button>
        <div class="word-display" id="result-word">-</div>
        <div class="result-row result-checking" id="result-status">
            <div class="result-icon">⟳</div>
            <span id="result-text">Procesando...</span>
        </div>
        <div class="confidence-track">
            <div class="confidence-fill" id="conf-bar" style="width:0%; background:#FF9F0A;"></div>
        </div>
    </div>

    <!-- Tesseract.js desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <script>
        // ========== CONFIGURACIÓN ==========
        // Base de datos: lista SCOWL completa desde GitHub (más confiable y rápido)
        const WORDLIST_URL = 'https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt';
        // Backup más ligero (10,000 palabras más comunes)
        const WORDLIST_BACKUP = 'https://raw.githubusercontent.com/first20hours/google-10000-english/master/google-10000-english-usa-no-swears.txt';
        
        let dictionary = new Set();
        let tesseractWorker = null;
        let videoStream = null;
        let isScanning = false;
        let lastWord = '';
        let scanInterval = null;

        // ========== CARGAR DICCIONARIO ==========
        async function loadDictionary() {
            const progress = document.getElementById('load-progress');
            const countEl = document.getElementById('word-count');
            
            try {
                progress.style.width = '10%';
                
                // Intentar descargar lista principal
                let response = await fetch(WORDLIST_URL, { 
                    cache: 'force-cache',
                    headers: { 'Accept': 'text/plain' }
                });
                
                if (!response.ok) throw new Error('Primary failed');
                
                progress.style.width = '40%';
                const text = await response.text();
                
                progress.style.width = '60%';
                // Procesar: una palabra por línea, minúsculas, filtrar vacías
                const lines = text.split('\n');
                const words = [];
                for (let i = 0; i < lines.length; i++) {
                    const w = lines[i].trim().toLowerCase();
                    if (w.length >= 2) words.push(w);
                    // Progreso visual cada 50k líneas
                    if (i % 50000 === 0) {
                        progress.style.width = `${60 + (i / lines.length) * 30}%`;
                        await new Promise(r => setTimeout(r, 0)); // Yield
                    }
                }
                
                dictionary = new Set(words);
                progress.style.width = '100%';
                countEl.textContent = `${dictionary.size.toLocaleString()} palabras cargadas`;
                
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('camera-view').style.display = 'flex';
                    initCamera();
                }, 600);
                
            } catch (err) {
                console.error('Error lista principal:', err);
                // Fallback a lista de respaldo
                try {
                    countEl.textContent = 'Usando lista de respaldo...';
                    const response = await fetch(WORDLIST_BACKUP, { cache: 'force-cache' });
                    const text = await response.text();
                    const words = text.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length >= 2);
                    dictionary = new Set(words);
                    countEl.textContent = `${dictionary.size.toLocaleString()} palabras (respaldo)`;
                    
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('camera-view').style.display = 'flex';
                        initCamera();
                    }, 600);
                } catch (err2) {
                    countEl.textContent = 'Error de conexión. Recarga la página.';
                    countEl.style.color = '#FF453A';
                }
            }
        }

        // ========== INICIAR CÁMARA ==========
        async function initCamera() {
            try {
                // iOS: preferir cámara trasera (environment)
                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('video');
                video.srcObject = videoStream;
                
                await video.play();
                
                // Inicializar Tesseract worker
                updateDictStatus('loading', 'Iniciando OCR...');
                tesseractWorker = await Tesseract.createWorker('eng', 1, {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            // Silencioso para performance
                        }
                    }
                });
                
                // Configurar Tesseract para solo letras (más rápido)
                await tesseractWorker.setParameters({
                    tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',
                    preserve_interword_spaces: '0',
                });
                
                updateDictStatus('ready', 'Listo');
                startAutoScan();
                
            } catch (err) {
                console.error('Camera error:', err);
                alert('Error cámara: ' + err.message);
            }
        }

        // ========== ESCANEO AUTOMÁTICO ==========
        function startAutoScan() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // Esperar a que video esté listo
            const checkReady = setInterval(() => {
                if (video.readyState >= 2) {
                    clearInterval(checkReady);
                    
                    // Canvas pequeño: SOLO la zona del scan (performance clave)
                    canvas.width = 400;
                    canvas.height = 100;
                    
                    // Escanear cada 400ms (balance velocidad/batería)
                    scanInterval = setInterval(() => doScan(ctx, canvas, video), 400);
                }
            }, 100);
        }

        async function doScan(ctx, canvas, video) {
            if (isScanning || !tesseractWorker) return;
            isScanning = true;
            
            const startTime = performance.now();
            
            try {
                // Calcular coordenadas del scan-zone en el video
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                const cropY = Math.floor(vH * 0.42); // Centrado verticalmente
                const cropH = Math.floor(vH * 0.16); // ~16% de altura
                
                // Dibujar SOLO la zona de escaneo (ultra rápido)
                ctx.drawImage(video, 
                    0, cropY, vW, cropH,
                    0, 0, canvas.width, canvas.height
                );
                
                // OCR
                const result = await tesseractWorker.recognize(canvas);
                const rawText = result.data.text;
                const confidence = result.data.confidence;
                
                // Extraer palabras: limpiar, filtrar, normalizar
                const candidates = rawText
                    .replace(/[^a-zA-Z\s]/g, '') // Solo letras
                    .split(/\s+/)
                    .map(w => w.trim().toLowerCase())
                    .filter(w => w.length >= 3 && w.length <= 18);
                
                if (candidates.length > 0) {
                    const bestWord = candidates[0];
                    
                    // Solo procesar si cambió la palabra
                    if (bestWord !== lastWord) {
                        lastWord = bestWord;
                        await showResult(bestWord, confidence, startTime);
                    }
                }
                
                const elapsed = Math.round(performance.now() - startTime);
                document.getElementById('timer-badge').textContent = `${elapsed}ms`;
                
            } catch (err) {
                console.error('Scan error:', err);
            } finally {
                isScanning = false;
            }
        }

        // ========== CAPTURA MANUAL ==========
        async function manualCapture() {
            const btn = document.getElementById('capture-btn');
            btn.classList.add('processing');
            
            // Flash
            const flash = document.getElementById('flash-overlay');
            flash.classList.add('on');
            setTimeout(() => flash.classList.remove('on'), 100);
            
            // Forzar un scan inmediato
            isScanning = false;
            
            // Si no hay palabra detectada, mostrar mensaje
            if (!lastWord) {
                showResult('???', 0, performance.now(), true);
            }
            
            setTimeout(() => btn.classList.remove('processing'), 500);
        }

        // ========== MOSTRAR RESULTADO ==========
        async function showResult(word, confidence, startTime, isManual = false) {
            const sheet = document.getElementById('result-sheet');
            const wordEl = document.getElementById('result-word');
            const statusRow = document.getElementById('result-status');
            const statusText = document.getElementById('result-text');
            const statusIcon = statusRow.querySelector('.result-icon');
            const confBar = document.getElementById('conf-bar');
            const history = document.getElementById('history-pill');
            
            // Mostrar sheet
            sheet.classList.add('active');
            wordEl.textContent = word;
            
            // Estado: verificando
            statusRow.className = 'result-row result-checking';
            statusIcon.textContent = '⟳';
            statusText.textContent = 'Verificando...';
            confBar.style.width = `${Math.min(confidence, 100)}%`;
            confBar.style.background = '#FF9F0A';
            
            // Validación ultra-rápida con Set (O(1))
            const isValid = dictionary.has(word);
            
            // Pequeña pausa para UX (aunque ya tenemos resultado)
            await new Promise(r => setTimeout(r, 150));
            
            if (isValid) {
                statusRow.className = 'result-row result-valid';
                statusIcon.textContent = '✓';
                statusText.textContent = '¡Palabra REAL!';
                confBar.style.background = '#30D158';
                if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            } else {
                statusRow.className = 'result-row result-invalid';
                statusIcon.textContent = '✕';
                statusText.textContent = 'NO existe';
                confBar.style.background = '#FF453A';
                if (navigator.vibrate) navigator.vibrate(80);
            }
            
            // Actualizar historial
            history.textContent = `Última: ${word} ${isValid ? '✓' : '✕'}`;
            history.classList.add('visible');
            setTimeout(() => history.classList.remove('visible'), 2500);
            
            // Auto-cerrar después de 4 segundos
            setTimeout(() => {
                if (lastWord === word) closeResult();
            }, 4000);
        }

        function closeResult() {
            document.getElementById('result-sheet').classList.remove('active');
            lastWord = '';
        }

        // ========== UTILIDADES ==========
        function updateDictStatus(state, text) {
            const badge = document.getElementById('dict-badge');
            const icon = document.getElementById('dict-icon');
            const label = document.getElementById('dict-label');
            
            badge.className = `badge dict-${state}`;
            label.textContent = text;
            
            if (state === 'ready') icon.textContent = '✓';
            else if (state === 'error') icon.textContent = '!';
            else icon.textContent = '⏳';
        }

        // ========== INICIAR ==========
        window.addEventListener('DOMContentLoaded', loadDictionary);
        
        // Limpieza al salir
        window.addEventListener('beforeunload', () => {
            if (scanInterval) clearInterval(scanInterval);
            if (tesseractWorker) tesseractWorker.terminate();
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
        });
    </script>
</body>
</html>
