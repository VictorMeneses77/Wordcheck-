<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>⚡ WordCheck Pro - Zoom OCR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none;
        }
        
        /* Vista previa de la cámara (lo que ve el usuario) */
        #camera-preview {
            position: relative;
            flex: 1;
            overflow: hidden;
            background: #000;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Zona de escaneo visual */
        #scan-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 140px;
            border: 3px solid #30D158;
            border-radius: 18px;
            box-shadow: 0 0 0 500px rgba(0,0,0,0.4), 0 0 40px rgba(48,209,88,0.3), inset 0 0 30px rgba(48,209,88,0.05);
            pointer-events: none;
            z-index: 10;
        }
        #scan-zone::before {
            content: 'ENFOCA LA PALABRA AQUÍ';
            position: absolute;
            top: -32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 700;
            color: #30D158;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(48,209,88,0.5);
            white-space: nowrap;
        }
        .scan-laser {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #30D158;
            box-shadow: 0 0 15px #30D158, 0 0 30px #30D158;
            animation: laser 1.8s ease-in-out infinite;
            border-radius: 1px;
        }
        @keyframes laser {
            0%, 100% { top: 15%; opacity: 0.3; }
            50% { top: 85%; opacity: 1; }
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #30D158;
            border-style: solid;
        }
        .corner-tl { top: -3px; left: -3px; border-width: 4px 0 0 4px; border-radius: 8px 0 0 0; }
        .corner-tr { top: -3px; right: -3px; border-width: 4px 4px 0 0; border-radius: 0 8px 0 0; }
        .corner-bl { bottom: -3px; left: -3px; border-width: 0 0 4px 4px; border-radius: 0 0 0 8px; }
        .corner-br { bottom: -3px; right: -3px; border-width: 0 4px 4px 0; border-radius: 0 0 8px 0; }
        
        /* Canvas oculto para OCR (procesamiento) */
        #ocr-canvas {
            display: none;
        }
        
        /* Vista previa del zoom (miniatura de lo que se está procesando) */
        #zoom-preview {
            position: absolute;
            top: 80px;
            right: 16px;
            width: 120px;
            height: 80px;
            border: 2px solid #30D158;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #zoom-preview.active {
            opacity: 1;
        }
        #zoom-preview canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #zoom-label {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 700;
            color: #30D158;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        /* Controles de zoom */
        #zoom-controls {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 20;
        }
        .zoom-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-touch-callout: none;
            user-select: none;
        }
        .zoom-btn:active { transform: scale(0.9); background: rgba(48,209,88,0.3); border-color: #30D158; }
        #zoom-level-display {
            text-align: center;
            font-size: 14px;
            font-weight: 800;
            color: #30D158;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 8px 4px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* UI superior */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .badge {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge.dict-loading { color: #FF9F0A; }
        .badge.dict-ready { color: #30D158; }
        #timer-badge { color: #64D2FF; font-family: 'SF Mono', monospace; font-size: 13px; }
        
        /* Botón de captura */
        #capture-btn {
            position: absolute;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 4px solid rgba(255,255,255,0.8);
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s;
        }
        #capture-btn:active { transform: translateX(-50%) scale(0.92); }
        #capture-btn::after {
            content: '';
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #fff;
            transition: background 0.2s;
        }
        #capture-btn.processing::after { background: #FF9F0A; }
        
        /* Result Panel */
        #result-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            padding: 24px 20px 32px;
            padding-bottom: max(32px, env(safe-area-inset-bottom));
            border-radius: 28px 28px 0 0;
            transform: translateY(110%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 100;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        #result-sheet.active { transform: translateY(0); }
        .word-display {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            line-height: 1.1;
        }
        .result-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
        }
        .result-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .result-valid { color: #30D158; }
        .result-valid .result-icon { background: #30D158; color: #000; }
        .result-invalid { color: #FF453A; }
        .result-invalid .result-icon { background: #FF453A; color: #fff; }
        .result-checking { color: #FF9F0A; }
        .result-checking .result-icon { background: #FF9F0A; color: #000; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .confidence-track {
            margin-top: 16px;
            height: 5px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Pantalla de carga */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            gap: 20px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top-color: #30D158;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #30D158, #64D2FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loading-sub {
            color: #8E8E93;
            font-size: 14px;
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
        }
        .progress-ios {
            width: 200px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-ios-fill {
            height: 100%;
            background: #30D158;
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }
        .word-count {
            color: #8E8E93;
            font-size: 13px;
            margin-top: 4px;
        }
        
        /* Flash */
        #flash-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 90;
            transition: opacity 0.08s;
        }
        #flash-overlay.on { opacity: 0.25; }
        
        /* History pill */
        #history-pill {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            color: #8E8E93;
            opacity: 0;
            transition: all 0.3s;
            white-space: nowrap;
            z-index: 15;
        }
        #history-pill.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Indicador de distancia */
        #distance-hint {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            color: #FF9F0A;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 15;
            text-align: center;
            max-width: 80%;
        }
        #distance-hint.show { opacity: 1; }
    </style>
</head>
<body>

    <!-- Pantalla de carga -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-title">WordCheck Pro</div>
        <div class="loading-sub">Descargando base de datos de palabras...</div>
        <div class="progress-ios"><div class="progress-ios-fill" id="load-progress"></div></div>
        <div class="word-count" id="word-count">0 palabras</div>
    </div>

    <!-- Flash -->
    <div id="flash-overlay"></div>

    <!-- Cámara -->
    <div id="camera-preview" style="display:none;">
        <video id="video" autoplay playsinline muted></video>
        
        <!-- Zona de escaneo visual -->
        <div id="scan-zone">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="scan-laser"></div>
        </div>
        
        <!-- Vista previa del zoom (lo que OCR ve) -->
        <div id="zoom-preview">
            <canvas id="zoom-preview-canvas"></canvas>
            <div id="zoom-label">OCR</div>
        </div>
        
        <!-- Hint de distancia -->
        <div id="distance-hint">
            📏 Acércate más o usa el zoom (+)<br>
            <span style="font-size:12px; color:#aaa;">La palabra es muy pequeña para leerla</span>
        </div>
        
        <!-- Controles de zoom -->
        <div id="zoom-controls">
            <button class="zoom-btn" onclick="changeZoom(0.5)" ontouchstart="changeZoom(0.5)">+</button>
            <div id="zoom-level-display">1.0x</div>
            <button class="zoom-btn" onclick="changeZoom(-0.5)" ontouchstart="changeZoom(-0.5)">−</button>
        </div>
        
        <!-- UI superior -->
        <div id="ui-layer">
            <div class="badge dict-loading" id="dict-badge">
                <span id="dict-icon">⏳</span>
                <span id="dict-label">Cargando...</span>
            </div>
            <div class="badge" id="timer-badge">0ms</div>
        </div>
        
        <div id="history-pill">Última: -</div>
        
        <button id="capture-btn" onclick="manualCapture()"></button>
    </div>

    <!-- Canvas oculto para OCR -->
    <canvas id="ocr-canvas"></canvas>

    <!-- Resultado -->
    <div id="result-sheet">
        <button class="close-btn" onclick="closeResult()">✕</button>
        <div class="word-display" id="result-word">-</div>
        <div class="result-row result-checking" id="result-status">
            <div class="result-icon">⟳</div>
            <span id="result-text">Procesando...</span>
        </div>
        <div class="confidence-track">
            <div class="confidence-fill" id="conf-bar" style="width:0%; background:#FF9F0A;"></div>
        </div>
    </div>

    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <script>
        // ========== CONFIGURACIÓN ==========
        const WORDLIST_URL = 'https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt';
        const WORDLIST_BACKUP = 'https://raw.githubusercontent.com/first20hours/google-10000-english/master/google-10000-english-usa-no-swears.txt';
        
        let dictionary = new Set();
        let tesseractWorker = null;
        let videoStream = null;
        let isProcessing = false;
        let lastWord = '';
        let scanInterval = null;
        
        // ========== ZOOM PARA OCR ==========
        // Este zoom afecta el canvas de OCR, no solo la visualización
        let ocrZoomLevel = 1.0;  // Factor de zoom para el canvas de procesamiento
        const MIN_ZOOM = 1.0;
        const MAX_ZOOM = 5.0;
        
        function updateZoomDisplay() {
            document.getElementById('zoom-level-display').textContent = ocrZoomLevel.toFixed(1) + 'x';
        }
        
        function changeZoom(delta) {
            ocrZoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, ocrZoomLevel + delta));
            updateZoomDisplay();
            // Feedback háptico
            if (navigator.vibrate) navigator.vibrate(10);
        }
        
        // Pinch zoom para OCR
        let initialPinchDistance = 0;
        let initialZoom = 1.0;
        
        const cameraPreview = document.getElementById('camera-preview');
        
        cameraPreview.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialZoom = ocrZoomLevel;
            }
        }, { passive: true });
        
        cameraPreview.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const distance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const scale = distance / initialPinchDistance;
                ocrZoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, initialZoom * scale));
                updateZoomDisplay();
            }
        }, { passive: false });

        // ========== CARGAR DICCIONARIO ==========
        async function loadDictionary() {
            const progress = document.getElementById('load-progress');
            const countEl = document.getElementById('word-count');
            
            try {
                progress.style.width = '10%';
                let response = await fetch(WORDLIST_URL, { cache: 'force-cache' });
                if (!response.ok) throw new Error('Primary failed');
                
                progress.style.width = '40%';
                const text = await response.text();
                
                progress.style.width = '60%';
                const lines = text.split('\n');
                const words = [];
                for (let i = 0; i < lines.length; i++) {
                    const w = lines[i].trim().toLowerCase();
                    if (w.length >= 2) words.push(w);
                    if (i % 50000 === 0) {
                        progress.style.width = `${60 + (i / lines.length) * 30}%`;
                        await new Promise(r => setTimeout(r, 0));
                    }
                }
                
                dictionary = new Set(words);
                progress.style.width = '100%';
                countEl.textContent = `${dictionary.size.toLocaleString()} palabras cargadas`;
                
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('camera-preview').style.display = 'block';
                    initCamera();
                }, 600);
                
            } catch (err) {
                console.error('Error lista principal:', err);
                try {
                    countEl.textContent = 'Usando lista de respaldo...';
                    const response = await fetch(WORDLIST_BACKUP, { cache: 'force-cache' });
                    const text = await response.text();
                    const words = text.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length >= 2);
                    dictionary = new Set(words);
                    countEl.textContent = `${dictionary.size.toLocaleString()} palabras (respaldo)`;
                    
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('camera-preview').style.display = 'block';
                        initCamera();
                    }, 600);
                } catch (err2) {
                    countEl.textContent = 'Error de conexión. Recarga la página.';
                    countEl.style.color = '#FF453A';
                }
            }
        }

        // ========== INICIAR CÁMARA ==========
        async function initCamera() {
            try {
                // Solicitar resolución máxima posible
                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };
                
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('video');
                video.srcObject = videoStream;
                
                await video.play();
                
                updateDictStatus('loading', 'Iniciando OCR...');
                tesseractWorker = await Tesseract.createWorker('eng', 1, {
                    logger: m => {}
                });
                
                // Configurar Tesseract para solo letras
                await tesseractWorker.setParameters({
                    tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',
                    preserve_interword_spaces: '0',
                });
                
                updateDictStatus('ready', 'Listo');
                startAutoScan();
                
            } catch (err) {
                console.error('Camera error:', err);
                alert('Error cámara: ' + err.message);
            }
        }

        // ========== ESCANEO AUTOMÁTICO CON ZOOM ==========
        function startAutoScan() {
            const video = document.getElementById('video');
            const ocrCanvas = document.getElementById('ocr-canvas');
            const ocrCtx = ocrCanvas.getContext('2d', { willReadFrequently: true });
            const zoomPreview = document.getElementById('zoom-preview');
            const zoomPreviewCanvas = document.getElementById('zoom-preview-canvas');
            const zoomCtx = zoomPreviewCanvas.getContext('2d');
            
            const checkReady = setInterval(() => {
                if (video.readyState >= 2) {
                    clearInterval(checkReady);
                    scanInterval = setInterval(() => doScan(ocrCanvas, ocrCtx, zoomPreviewCanvas, zoomCtx, video), 500);
                }
            }, 100);
        }

        async function doScan(ocrCanvas, ocrCtx, zoomPreviewCanvas, zoomCtx, video) {
            if (isProcessing || !tesseractWorker) return;
            isProcessing = true;
            
            const startTime = performance.now();
            const distanceHint = document.getElementById('distance-hint');
            
            try {
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                
                // Área de la zona de escaneo en el video (aprox 85% ancho, 140px alto en pantalla)
                // Mapeamos la zona visual al video real
                const scanZoneWidthRatio = 0.85;
                const scanZoneHeightPx = 140;
                const scanZoneHeightRatio = scanZoneHeightPx / window.innerHeight;
                
                const cropX = Math.floor(vW * (1 - scanZoneWidthRatio) / 2);
                const cropY = Math.floor(vH * 0.4); // Centrado verticalmente
                const cropW = Math.floor(vW * scanZoneWidthRatio);
                const cropH = Math.floor(vH * scanZoneHeightRatio);
                
                // Aplicar ZOOM al canvas de OCR
                // Canvas más grande = más píxeles para Tesseract
                const zoomedWidth = Math.floor(cropW * ocrZoomLevel);
                const zoomedHeight = Math.floor(cropH * ocrZoomLevel);
                
                // Límite razonable para performance
                const maxCanvasSize = 1200;
                const finalW = Math.min(zoomedWidth, maxCanvasSize);
                const finalH = Math.min(zoomedHeight, maxCanvasSize);
                
                ocrCanvas.width = finalW;
                ocrCanvas.height = finalH;
                
                // Dibujar con zoom (stretch del crop)
                ocrCtx.drawImage(video, 
                    cropX, cropY, cropW, cropH,
                    0, 0, finalW, finalH
                );
                
                // Mostrar preview del zoom
                zoomPreviewCanvas.width = finalW;
                zoomPreviewCanvas.height = finalH;
                zoomCtx.drawImage(ocrCanvas, 0, 0);
                document.getElementById('zoom-preview').classList.add('active');
                
                // OCR en la imagen ampliada
                const result = await tesseractWorker.recognize(ocrCanvas);
                const rawText = result.data.text;
                const confidence = result.data.confidence;
                
                // Extraer palabras
                const candidates = rawText
                    .replace(/[^a-zA-Z\s]/g, '')
                    .split(/\s+/)
                    .map(w => w.trim().toLowerCase())
                    .filter(w => w.length >= 3 && w.length <= 20);
                
                if (candidates.length > 0) {
                    const bestWord = candidates[0];
                    
                    if (bestWord !== lastWord) {
                        lastWord = bestWord;
                        await showResult(bestWord, confidence, startTime);
                        distanceHint.classList.remove('show');
                    }
                } else {
                    // Si no detecta nada y estamos lejos, mostrar hint
                    if (ocrZoomLevel < 2.0) {
                        distanceHint.classList.add('show');
                    }
                }
                
                const elapsed = Math.round(performance.now() - startTime);
                document.getElementById('timer-badge').textContent = `${elapsed}ms`;
                
            } catch (err) {
                console.error('Scan error:', err);
            } finally {
                isProcessing = false;
            }
        }

        // ========== CAPTURA MANUAL ==========
        async function manualCapture() {
            const btn = document.getElementById('capture-btn');
            btn.classList.add('processing');
            
            const flash = document.getElementById('flash-overlay');
            flash.classList.add('on');
            setTimeout(() => flash.classList.remove('on'), 100);
            
            isProcessing = false;
            if (!lastWord) showResult('???', 0, performance.now(), true);
            
            setTimeout(() => btn.classList.remove('processing'), 500);
        }

        // ========== MOSTRAR RESULTADO ==========
        async function showResult(word, confidence, startTime, isManual = false) {
            const sheet = document.getElementById('result-sheet');
            const wordEl = document.getElementById('result-word');
            const statusRow = document.getElementById('result-status');
            const statusText = document.getElementById('result-text');
            const statusIcon = statusRow.querySelector('.result-icon');
            const confBar = document.getElementById('conf-bar');
            const history = document.getElementById('history-pill');
            
            sheet.classList.add('active');
            wordEl.textContent = word;
            
            statusRow.className = 'result-row result-checking';
            statusIcon.textContent = '⟳';
            statusText.textContent = 'Verificando...';
            confBar.style.width = `${Math.min(confidence, 100)}%`;
            confBar.style.background = '#FF9F0A';
            
            const isValid = dictionary.has(word);
            await new Promise(r => setTimeout(r, 150));
            
            if (isValid) {
                statusRow.className = 'result-row result-valid';
                statusIcon.textContent = '✓';
                statusText.textContent = '¡Palabra REAL!';
                confBar.style.background = '#30D158';
                if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            } else {
                statusRow.className = 'result-row result-invalid';
                statusIcon.textContent = '✕';
                statusText.textContent = 'NO existe';
                confBar.style.background = '#FF453A';
                if (navigator.vibrate) navigator.vibrate(80);
            }
            
            history.textContent = `Última: ${word} ${isValid ? '✓' : '✕'}`;
            history.classList.add('visible');
            setTimeout(() => history.classList.remove('visible'), 2500);
            
            setTimeout(() => {
                if (lastWord === word) closeResult();
            }, 4000);
        }

        function closeResult() {
            document.getElementById('result-sheet').classList.remove('active');
            lastWord = '';
        }

        function updateDictStatus(state, text) {
            const badge = document.getElementById('dict-badge');
            const icon = document.getElementById('dict-icon');
            const label = document.getElementById('dict-label');
            badge.className = `badge dict-${state}`;
            label.textContent = text;
            if (state === 'ready') icon.textContent = '✓';
            else if (state === 'error') icon.textContent = '!';
            else icon.textContent = '⏳';
        }

        window.addEventListener('DOMContentLoaded', loadDictionary);
        
        window.addEventListener('beforeunload', () => {
            if (scanInterval) clearInterval(scanInterval);
            if (tesseractWorker) tesseractWorker.terminate();
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
        });
    </script>
</body>
</html>
